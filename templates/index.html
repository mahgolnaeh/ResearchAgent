<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Research Assistant</h1>
            <p class="subtitle">Conduct literature reviews and draft research reports</p>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-button active" data-tab="review">Literature Review</button>
                <button class="tab-button" data-tab="report">Research Report</button>
            </div>

            <div id="review-tab" class="tab-content active">
                <div class="form-section">
                    <h2>Conduct a Literature Review</h2>
                    <div class="form-group">
                        <label for="review-topic">Research Topic *</label>
                        <input type="text" id="review-topic" placeholder="e.g., Machine Learning in Healthcare" required>
                    </div>
                    <div class="form-group">
                        <label for="review-questions">Research Questions (optional)</label>
                        <div id="review-questions-container">
                            <input type="text" class="question-input" placeholder="Enter a research question">
                        </div>
                        <button type="button" class="btn-secondary" onclick="addQuestion('review')">+ Add Question</button>
                    </div>
                    <div class="form-group">
                        <label for="review-max-sources">Maximum Sources</label>
                        <input type="number" id="review-max-sources" value="10" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="review-reflexion" checked>
                            Enable Reflexion (self-correction)
                        </label>
                    </div>
                    <button class="btn-primary" onclick="conductReview()">Start Literature Review</button>
                </div>
            </div>

            <div id="report-tab" class="tab-content">
                <div class="form-section">
                    <h2>Draft a Research Report</h2>
                    <div class="form-group">
                        <label for="report-topic">Research Topic *</label>
                        <input type="text" id="report-topic" placeholder="e.g., AI Ethics in Healthcare" required>
                    </div>
                    <div class="form-group">
                        <label for="report-questions">Research Questions *</label>
                        <div id="report-questions-container">
                            <input type="text" class="question-input" placeholder="Enter a research question" required>
                        </div>
                        <button type="button" class="btn-secondary" onclick="addQuestion('report')">+ Add Question</button>
                    </div>
                    <div class="form-group">
                        <label for="report-context">Additional Context (optional)</label>
                        <textarea id="report-context" rows="3" placeholder="Any additional requirements or context..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="report-reflexion" checked>
                            Enable Reflexion (self-correction)
                        </label>
                    </div>
                    <button class="btn-primary" onclick="draftReport()">Draft Report</button>
                </div>
            </div>

            <div id="results-section" class="results-section hidden">
                <h2>Results</h2>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Processing your request... This may take a few minutes.</p>
                </div>
                <div id="results-content"></div>
                <div id="results-actions" class="results-actions hidden">
                    <button class="btn-secondary" onclick="downloadResults('md')">Download as Markdown</button>
                    <button class="btn-secondary" onclick="downloadResults('json')">Download as JSON</button>
                </div>
            </div>

            <div id="error-section" class="error-section hidden">
                <h3>Error</h3>
                <p id="error-message"></p>
            </div>
        </main>
    </div>

    <script>
        let currentResults = null;

        document.querySelectorAll('.tab-button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var tab = this.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                document.querySelectorAll('.tab-button').forEach(function(b) { b.classList.remove('active'); });
                document.getElementById(tab + '-tab').classList.add('active');
                this.classList.add('active');
                document.getElementById('results-section').classList.add('hidden');
                document.getElementById('error-section').classList.add('hidden');
                currentResults = null;
            });
        });

        function addQuestion(type) {
            var container = document.getElementById(type + '-questions-container');
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'question-input';
            input.placeholder = 'Enter a research question';
            container.appendChild(input);
        }

        function getQuestions(type) {
            var container = document.getElementById(type + '-questions-container');
            var inputs = container.querySelectorAll('.question-input');
            return Array.prototype.slice.call(inputs).map(function(i) { return i.value.trim(); }).filter(function(q) { return q; });
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results-content').innerHTML = '';
            document.getElementById('results-actions').classList.add('hidden');
            document.getElementById('error-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-section').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');
            hideLoading();
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatInline(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code>$1</code>');
        }

        function formatMarkdown(text) {
            if (!text) return '';
            var lines = String(text).split('\n');
            var html = '';
            var inList = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];

                if (line.startsWith('### ')) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h3>' + formatInline(escapeHtml(line.slice(4).trim())) + '</h3>';
                } else if (line.startsWith('## ')) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h2>' + formatInline(escapeHtml(line.slice(3).trim())) + '</h2>';
                } else if (line.startsWith('# ')) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h1>' + formatInline(escapeHtml(line.slice(2).trim())) + '</h1>';
                } else if (/^[-*] /.test(line)) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    html += '<li>' + formatInline(escapeHtml(line.slice(2).trim())) + '</li>';
                } else if (/^\d+\. /.test(line)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<ol><li>' + formatInline(escapeHtml(line.replace(/^\d+\. /, '').trim())) + '</li></ol>';
                } else if (line.trim() === '') {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<div class="md-spacer"></div>';
                } else {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<p>' + formatInline(escapeHtml(line)) + '</p>';
                }
            }

            if (inList) html += '</ul>';
            return html;
        }

        function displayResults(results, type) {
            hideLoading();
            currentResults = results;
            var html = '';

            if (type === 'review') {
                html += '<div class="result-header"><h3>' + escapeHtml(results.topic || 'Literature Review') + '</h3>';
                html += '<p><strong>Sources found:</strong> ' + (results.sources ? results.sources.length : 0) + '</p></div>';
                if (results.literature_review) {
                    html += '<div class="result-content"><h4>Literature Review</h4><div class="markdown-content">' + formatMarkdown(results.literature_review) + '</div></div>';
                }
                if (results.sources && results.sources.length > 0) {
                    html += '<div class="result-content"><h4>Sources</h4><ul class="sources-list">';
                    results.sources.forEach(function(source) {
                        html += '<li><a href="' + escapeHtml(source.url) + '" target="_blank">' + escapeHtml(source.title || source.url) + '</a></li>';
                    });
                    html += '</ul></div>';
                }
            } else if (type === 'report') {
                html += '<div class="result-header"><h3>' + escapeHtml(results.topic || 'Research Report') + '</h3></div>';
                if (results.report) {
                    html += '<div class="result-content"><div class="markdown-content">' + formatMarkdown(results.report) + '</div></div>';
                }
            }

            document.getElementById('results-content').innerHTML = html;
            document.getElementById('results-actions').classList.remove('hidden');
        }

        function conductReview() {
            var topic = document.getElementById('review-topic').value.trim();
            if (!topic) { showError('Please enter a research topic'); return; }
            showLoading();
            fetch('/api/review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic: topic,
                    questions: getQuestions('review'),
                    max_sources: parseInt(document.getElementById('review-max-sources').value, 10) || 10,
                    enable_reflexion: document.getElementById('review-reflexion').checked
                })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.error) { showError(data.error); return; }
                displayResults(data.results, 'review');
            }).catch(function(err) { showError('Network error: ' + err.message); });
        }

        function draftReport() {
            var topic = document.getElementById('report-topic').value.trim();
            var questions = getQuestions('report');
            if (!topic) { showError('Please enter a research topic'); return; }
            if (questions.length === 0) { showError('Please enter at least one research question'); return; }
            showLoading();
            fetch('/api/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic: topic,
                    questions: questions,
                    additional_context: document.getElementById('report-context').value.trim(),
                    enable_reflexion: document.getElementById('report-reflexion').checked
                })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.error) { showError(data.error); return; }
                displayResults(data.results, 'report');
            }).catch(function(err) { showError('Network error: ' + err.message); });
        }

        function downloadResults(filetype) {
            if (!currentResults) { showError('No results to download'); return; }
            var filename = (currentResults.topic || 'results').replace(/[^a-z0-9]/gi, '_').toLowerCase();
            fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ results: currentResults, filename: filename, filetype: filetype })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.error) { showError(data.error); return; }
                alert('File saved to: ' + data.filepath);
            }).catch(function(err) { showError('Download error: ' + err.message); });
        }
    </script>
</body>
</html>
